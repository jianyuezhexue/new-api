# 前端开发环境 — 后端从本地源码构建
#
# 使用方法:
#   1. docker compose -f docker-compose.dev.yml up -d
#   2. cd web && bun install && bun run dev
#   3. 打开 http://localhost:3001（Rsbuild 开发服务器，API 自动代理到 :3000）
#
# Go 代码变更后重新构建后端:
#   docker compose -f docker-compose.dev.yml up -d --build new-api
#
# 停止:
#   docker compose -f docker-compose.dev.yml down
#
# 重置数据:
#   docker compose -f docker-compose.dev.yml down -v

services:
  new-api:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        - GOPROXY=https://goproxy.cn,direct
    image: new-api-dev:local
    container_name: new-api-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - dev_data:/data
    environment:
      - SQL_DSN=root:buildingblocks@tcp(8.155.47.77:3306)/new-api
      - REDIS_CONN_STRING=redis://:buildingblocks@8.155.47.77:6379
      - TZ=Asia/Shanghai
      - BATCH_UPDATE_ENABLED=true
    networks:
      - dev-network

volumes:
  dev_data:

networks:
  dev-network:
    driver: bridge
