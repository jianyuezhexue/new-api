# New-API 生产环境 Docker Compose 配置
# 使用 Dockerfile.runtime — 从预构建的 release/ 产物构建镜像。
#
# 快速开始:
#   1. bash build.sh           # 构建前后端 → release/
#   2. docker compose up -d    # 构建镜像并启动
#   3. 访问 http://localhost:3000
#
# 代码变更后更新:
#   1. bash build.sh
#   2. docker compose up -d --build
#
# 停止:
#   docker compose down

services:
  new-api:
    build:
      context: .
      dockerfile: Dockerfile.runtime
    image: new-api:latest
    container_name: new-api
    restart: always
    command: --log-dir /app/logs
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - SQL_DSN=root:buildingblocks@tcp(mysql:3306)/new-api
      - REDIS_CONN_STRING=redis://:buildingblocks@redis:6379
      - TZ=Asia/Shanghai
      - ERROR_LOG_ENABLED=true
      - BATCH_UPDATE_ENABLED=true
      - NODE_NAME=new-api-node-1
      - PORT=3000
      # - SESSION_SECRET=random_string  # 多节点部署时必须设置此随机字符串
      # - LOG_SQL_DSN=root:buildingblocks@tcp(8.155.47.77:3306)/new-api-log
    volumes:
      - ./release:/app
      - ./logs:/app/logs
    networks:
      - default
      - buildingblocks_default
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  buildingblocks_default:
    external: true
